<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - VORTEX STRIKE</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <nav class="nav">
      <a href="/" class="nav-brand">
        <div class="nav-brand-icon">VS</div>
        VORTEX STRIKE
      </a>
      <div class="nav-links" id="nav-links">
        <a href="/">ホーム</a>
        <a href="/about.html">設立目的</a>
        <a href="/members.html">メンバー</a>
        <a href="/activities.html">活動内容・場所</a>
        <a href="/reports.html">活動報告</a>
        <a href="/join.html">新規さん向け</a>
        <a href="/board.html">連絡掲示板</a>
        <a href="/contact.html">お問い合わせ</a>
      </div>
      <div class="nav-right">
        <div id="auth-nav"></div>
        <button class="nav-hamburger" onclick="toggleNav()">☰</button>
      </div>
    </nav>
  </header>

  <main>
    <div class="auth-container">
      <h2>ログイン</h2>
      <div id="alert"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="password">パスワード</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary">ログイン</button>
      </form>
      <div class="auth-link">
        <p>アカウントをお持ちでない方は <a href="/register.html">こちら</a></p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p class="copyright">&copy; 2026 VORTEX STRIKE. All rights reserved.</p>
  </footer>

  <script src="/js/auth.js"></script>
  <script>
    function toggleNav() {
      document.getElementById('nav-links').classList.toggle('show');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const alertEl = document.getElementById('alert');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/';
        } else {
          alertEl.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
        }
      } catch (e) {
        alertEl.innerHTML = '<div class="alert alert-error">通信エラーが発生しました</div>';
      }
    });
  </script>
</body>
</html>
