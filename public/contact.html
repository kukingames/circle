<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ - VORTEX STRIKE</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <nav class="nav">
      <a href="/" class="nav-brand">
        <div class="nav-brand-icon">VS</div>
        VORTEX STRIKE
      </a>
      <div class="nav-links" id="nav-links">
        <a href="/">ホーム</a>
        <a href="/about.html">設立目的</a>
        <a href="/members.html">メンバー</a>
        <a href="/activities.html">活動内容・場所</a>
        <a href="/reports.html">活動報告</a>
        <a href="/join.html">新規さん向け</a>
        <a href="/board.html">連絡掲示板</a>
        <a href="/contact.html">お問い合わせ</a>
      </div>
      <div class="nav-right">
        <div id="auth-nav"></div>
        <button class="nav-hamburger" onclick="toggleNav()">☰</button>
      </div>
    </nav>
  </header>

  <main>
    <div class="page-header">
      <h1>お問い合わせ</h1>
      <p>ご質問やご相談はこちらから</p>
    </div>

    <section class="section">
      <div class="card">
        <div id="alert"></div>
        <form id="contact-form">
          <div class="form-group">
            <label for="name">お名前 *</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">メールアドレス *</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="subject">件名</label>
            <input type="text" id="subject" name="subject">
          </div>
          <div class="form-group">
            <label for="message">メッセージ *</label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">送信する</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p class="copyright">&copy; 2026 VORTEX STRIKE. All rights reserved.</p>
  </footer>

  <script src="/js/auth.js"></script>
  <script src="/js/contact.js"></script>
  <script>
    function toggleNav() {
      document.getElementById('nav-links').classList.toggle('show');
    }
  </script>
</body>
</html>
